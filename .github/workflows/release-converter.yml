name: Build & Release — HDZero Converter

# Push a tag like `converter-v1.4` to build, sign, notarize, and publish a GitHub Release with the
# .dmg. `workflow_dispatch` builds the same pipeline but uploads the .dmg as a run artifact only
# (no release) — handy for testing the signing chain without cutting a release.
on:
  push:
    tags:
      - 'converter-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for the build (e.g. 1.4)'
        required: true
        default: '1.4'

permissions:
  contents: write          # needed to create the GitHub Release

jobs:
  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: HDZeroConverter
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (ffmpeg + dylibbundler)
        run: brew install ffmpeg dylibbundler

      - name: Derive version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          else
            V="${GITHUB_REF_NAME#converter-v}"      # converter-v1.4 -> 1.4
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

      - name: Import Developer ID signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KCPASS="$(openssl rand -base64 24)"
          security create-keychain -p "$KCPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KCPASS" "$KEYCHAIN" >/dev/null
          # Put our keychain first in the search list so `security find-identity` finds the cert.
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Imported identities:"
          security find-identity -v -p codesigning | grep "Developer ID Application" || true

      - name: Write App Store Connect API key (for notarization)
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: echo "$ASC_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/ascauthkey.p8"

      - name: Build · sign · notarize · package
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          NOTARY_KEY: ${{ runner.temp }}/ascauthkey.p8
          NOTARY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          chmod +x build_app.sh
          ./build_app.sh
          # Stable artifact name (no spaces) for upload.
          DMG="HDZero Converter ${VERSION}.dmg"
          cp "$DMG" "$RUNNER_TEMP/HDZero-Converter-${VERSION}.dmg"

      - name: Clean up secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/ascauthkey.p8"

      - name: Upload artifact (workflow_dispatch test runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: HDZero-Converter-${{ steps.ver.outputs.version }}
          path: ${{ runner.temp }}/HDZero-Converter-${{ steps.ver.outputs.version }}.dmg

      - name: Publish GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          ASSET="$RUNNER_TEMP/HDZero-Converter-${VERSION}.dmg"
          NOTES="Native macOS app to fix HDZero/FPV goggle recordings (full-range yuvj420p → limited-range BT.709, re-wrapped for broad playback). Apple-signed + notarized — drag to Applications and double-click, no Terminal workaround.

          **Install:** download the \`.dmg\`, drag **HDZero Converter** to Applications, launch.
          **Requires:** macOS 13 (Ventura) or newer. Fully portable (ffmpeg bundled — no Homebrew needed)."
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$ASSET" \
              --title "HDZero Converter ${VERSION}" --notes "$NOTES"
          fi
