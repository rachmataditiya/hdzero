name: Build & Release — HDZero tools

# Push a tag to build, sign, notarize, and publish a GitHub Release with the .dmg:
#   converter-v1.4   → HDZeroConverter
#   programmer-v1.1  → HDZeroProgrammer
# `workflow_dispatch` runs the same pipeline but uploads the .dmg as a run artifact only (no release) —
# handy for testing the signing chain without cutting a release.
on:
  push:
    tags:
      - 'converter-v*'
      - 'programmer-v*'
  workflow_dispatch:
    inputs:
      tool:
        description: 'Which tool to build'
        type: choice
        options: [converter, programmer]
        required: true
      version:
        description: 'Version string (e.g. 1.4)'
        required: true

permissions:
  contents: write          # needed to create the GitHub Release

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tool + version
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TOOL="${{ github.event.inputs.tool }}"
            V="${{ github.event.inputs.version }}"
          else
            case "$GITHUB_REF_NAME" in
              converter-v*)  TOOL="converter" ;;
              programmer-v*) TOOL="programmer" ;;
              *) echo "::error::Unrecognized tag $GITHUB_REF_NAME"; exit 1 ;;
            esac
            V="${GITHUB_REF_NAME#*-v}"           # converter-v1.4 -> 1.4
          fi
          case "$TOOL" in
            converter)  DIR="HDZeroConverter";  APP="HDZero Converter";  BREW="ffmpeg dylibbundler" ;;
            programmer) DIR="HDZeroProgrammer"; APP="HDZero Programmer"; BREW="flashrom dylibbundler" ;;
          esac
          {
            echo "tool=$TOOL"; echo "dir=$DIR"; echo "app=$APP"; echo "brew=$BREW"; echo "version=$V"
          } >> "$GITHUB_OUTPUT"
          echo "→ $TOOL ($DIR) v$V"

      - name: Install build tools
        run: brew install ${{ steps.meta.outputs.brew }}

      - name: Import Developer ID signing certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KCPASS="$(openssl rand -base64 24)"
          security create-keychain -p "$KCPASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KCPASS" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KCPASS" "$KEYCHAIN" >/dev/null
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning | grep "Developer ID Application" || true

      - name: Write App Store Connect API key (for notarization)
        env:
          ASC_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: echo "$ASC_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/ascauthkey.p8"

      - name: Build · sign · notarize · package
        working-directory: ${{ steps.meta.outputs.dir }}
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          NOTARY_KEY: ${{ runner.temp }}/ascauthkey.p8
          NOTARY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          NOTARY_ISSUER: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          chmod +x build_app.sh
          ./build_app.sh
          SAFE="${{ steps.meta.outputs.app }}"; SAFE="${SAFE// /-}"   # "HDZero Programmer" -> HDZero-Programmer
          cp "${{ steps.meta.outputs.app }} ${VERSION}.dmg" "$RUNNER_TEMP/${SAFE}-${VERSION}.dmg"
          echo "asset=$RUNNER_TEMP/${SAFE}-${VERSION}.dmg" >> "$GITHUB_ENV"

      - name: Clean up secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/ascauthkey.p8"

      - name: Upload artifact (workflow_dispatch test runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.tool }}-${{ steps.meta.outputs.version }}
          path: ${{ env.asset }}

      - name: Publish GitHub Release (tag pushes)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          APP: ${{ steps.meta.outputs.app }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          NOTES="$APP $VERSION — Apple-signed + notarized macOS app. Download the .dmg, drag the app to Applications, double-click. Requires macOS 13+. No Terminal/xattr workaround needed."
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$asset" --title "$APP $VERSION" --notes "$NOTES"
          fi
